<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Calcular Promedio</title>
</head>
<body>

<div class="container bg-secondary p-3 text-light mt-5">
    <div class="mb-3">
        <h1>Sistema de Cotización de Arriendo de Vehículos</h1>
        <p>Una empresa de arriendo de vehículos necesita una página web para generar cotizaciones rápidas a sus clientes.</p>
    </div>

    <div class="row">
        <div class="col-xs-12 col-md-6 col-xl-6">
            <div class="input-group mb-3">
                <label class="input-group-text">Nombre Cliente: </label>
                <input class="form-control" id="nombreCliente" placeholder="Ingrese su nombre y apellido" type="text">
            </div>
            <div class="input-group mb-3">
                <label class="input-group-text">Dias en arriendo: </label>
                <input class="form-control" id="diasArriendo" placeholder="Ingrese la cantidad de dias de arriendo" type="number">
            </div>
            <div class="input-group mb-3">
                <label class="input-group-text">Valor diario del vehiculo: </label>
                <input class="form-control" id="valorVehiculo" placeholder="Ingrese el valor diario del vehiculo" type="number">
            </div>
            <div class="input-group mb-3">
                <label class="input-group-text">Valor diario del seguro: </label>
                <input class="form-control" id="valorSeguro" placeholder="Ingrese el valor diario del seguro" type="number">
            </div>
            <button class="btn btn-dark mb-3" id="calcularCotizacion">Generar Cotización</button>
        </div>

        <div class="col-xs-12 col-md-6 col-xl-6 ">
            <h4>Cotización:</h4>
            <p id="nombre">Nombre cliente:</p>
            <p id="CantidadDias">Cantidad de dias de arriendo:</p>
            <p id="totalArriendo">Costo total arriendo:</p>
            <p id="totalSeguro">Costo total seguro:</p>
            <p id="costoTotal">Total a pagar: $</p>
        </div>

    </div>
</div> 

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
            $(document).ready(function() {
                $("#calcularCotizacion").click(function() {
                    let nombreCliente = $("#nombreCliente").val();
                    let diasArriendo = Number($("#diasArriendo").val());
                    let valorVehiculo = Number($("#valorVehiculo").val());
                    let valorSeguro = Number($("#valorSeguro").val());
                    //cálculos
                    let totalArriendo = diasArriendo * valorVehiculo;
                    let totalSeguro = diasArriendo * valorSeguro;
                    let costoTotal = totalArriendo + totalSeguro;

                    $("#nombre").text(`Nombre cliente: ${nombreCliente}`);
                    $("#CantidadDias").text(`Cantidad de dias de arriendo: ${diasArriendo}`);
                    $("#totalArriendo").text(`Costo total arriendo: $${totalArriendo.toLocaleString('es-CL')}`);
                    $("#totalSeguro").text(`Costo total seguro: $${totalSeguro.toLocaleString('es-CL')}`);
                    $("#costoTotal").text(`Total a pagar: $${costoTotal.toLocaleString('es-CL')}`);                
                });
            });
</script>

</body>
</html>
