<div class="container bg-dark p-3">
    <div class="text-light">
        <h1>Formulario</h1>
        <p>En esta página podremos realizar:</p>
        <div class="mb-3">
          <ul class="list-group list-group-numbered list-group-horizontal">
            <li class="list-group-item">Suma</li>
            <li class="list-group-item">Resta</li>
            <li class="list-group-item">Multiplicación</li>
            <li class="list-group-item">División</li>
          </ul>
        </div>
 
    </div>
    <div class="input-group mb-3">
        <label class="input-group-text" for="numero1">Número 1: </label>
        <input class="form-control" id="numero1" placeholder="Agregue un número" type="number">
    </div>
    <div class="input-group mb-3">
        <label class="input-group-text" for="numero2">Número 2: </label>
        <input class="form-control" id="numero2" placeholder="Agregue un número" type="number">
    </div>
    
      <div class="row">
        <div class="col-3 d-grid">
          <button class="btn btn-info text-light" onclick="sumar()">Sumar</button>
        </div>
        <div class="col-3 d-grid">
          <button class="btn btn-info text-light" onclick="restar()">Restar</button>
        </div>
        <div class="col-3 d-grid">
          <button class="btn btn-info text-light" onclick="division()">División</button>
        </div> 
        <div class="col-3 d-grid">
          <button class="btn btn-info text-light" onclick="multiplicacion()">Multiplicación</button>
        </div>       
      </div>
</div>  

<script>
  //declarar las variables
  let numero1, numero2;

  function sumar() {
    //se le asigna un valor a esa variable
    numero1 = Number(document.getElementById("numero1").value);
    numero2 = Number(document.getElementById("numero2").value);
    alert(numero1 + numero2);
  }
  function restar() {
    numero1 = Number(document.getElementById("numero1").value);
    numero2 = Number(document.getElementById("numero2").value);
    alert(numero1 - numero2);
  }
   function division() {
    numero1 = Number(document.getElementById("numero1").value);
    numero2 = Number(document.getElementById("numero2").value);
    alert(numero1 / numero2);
   }

   function multiplicacion() {
    numero1 = Number(document.getElementById("numero1").value);
    numero2 = Number(document.getElementById("numero2").value);
    alert(`El primer nùmero es: ${numero1} El segundo nùmero es: ${numero2} RESULTADO ES: ${numero1 * numero2}`);
   }

  
</script>
