<!--  Conversor de Temperatura
Crea una página web que permita convertir una temperatura desde grados Celsius a grados Fahrenheit.
- Agrega un campo de entrada para que el usuario ingrese una temperatura en grados Celsius.
- Agrega un botón llamado "Convertir".
- Implementa la conversión utilizando la fórmula:
Fahrenheit = (Celsius * 9/5) + 32 -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body class="m-2">

    <div class="container p-4 bg-dark text-light">
        <div class="row">
            <h3 class="mb-3">Convertidor de Celcius a Fahrenheit</h3>
            <p>Ingrese una temperatura en Celsius para hacer su conversion a Fahrenheit y mostrar su valor en pantalla.</p>
            <div class="col-xs-12 col-md-8">  
                <div class="input-group mb-3">
                    <label class="input-group-text" for="">Ingrese temperatura en °C</label>
                    <input class="form-control" id="celsius" type="number" placeholder="">
                </div>
            </div>
            <div class="col-xs-12 col-md-4">
                <div class="input-group mb-3">
                    <button class="btn btn-info text-light" onclick="conversion()">Convertir a Fahrenheit</button>
                </div>
            </div>
            <div class="col-12">
                <p>Resultado: <span id="resultado"></span>°F</p>
            </div>
        </div>
    </div>

    <script>
        function conversion() {
            let celsius = Number(document.getElementById("celsius").value);
            let fahrenheit = (celsius * 9/5) + 32;
            document.getElementById("resultado").textContent = fahrenheit;
            //alert(`La temperatura en Fahrenheit es: ${fahrenheit}°F`);
        }
        
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
