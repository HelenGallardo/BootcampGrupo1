<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
    
    <style>
    body {
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    </style>
</head>
<body>
  <div class="container p-4 bg-dark text-light">
      <h2>Depositar</h2>
      <div class="form-group">
        <label for="monto">Monto a depositar:</label>
        <input type="number" class="form-control" id="monto" placeholder="Ingrese un monto">
      </div>
      <div>
        <button class="btn btn-primary mt-3" id="btnDepositar">Realizar depósito</button>
        <a href="menu.html" class="btn btn-secondary mt-3">Volver al Menú Principal</a>
      </div>

  </div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>


$('#btnDepositar').click(function() {
    let monto = parseFloat($('#monto').val());
    let balance = Number(localStorage.getItem("balance"));

    if (!isNaN(monto) && monto > 0) {
        balance += monto;
        localStorage.setItem("balance", balance);
        //guardar movimiento 
        let movimientos = JSON.parse(localStorage.getItem("movimientos")) || [];
        movimientos.push("Depósito: $" + monto);
        localStorage.setItem("movimientos", JSON.stringify(movimientos));
        $('#monto').val('');
        alert('Depósito realizado!');
    } else {
        alert('Monto inválido. Por favor ingrese un número positivo.');
    }
});
  </script>
</body>
</html>
