<!DOCTYPE html>
<html>
    <head>
        <title>Iniciar Sesión</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
        <style>
            body {
                padding: 20px;
            }

            .container {
                max-width: 500px;
                margin: 0 auto;
            }
            .cont-img{
                display: flex;
                justify-content: center; /* Centra horizontalmente */
                align-items: center; 
            }
            .cont-img img{
                width: 35%;
                margin-bottom: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container p-4 bg-dark text-light">
            <div class="cont-img">
                <img class="imagen" src="https://images.seeklogo.com/logo-png/34/1/banco-ciudad-de-buenos-aires-logo-png_seeklogo-344027.png" alt="">
            </div>
            <h2>Inicio de Sesión</h2>
                <form id="login">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" class="form-control" id="email" placeholder="Ingrese email">
                    </div> 
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" class="form-control" id="password" placeholder="Ingrese contraseña">
                    </div>
                    <button type="submit" class="btn btn-info" >Iniciar Sesión</button>
                </form>
        </div>
        
       <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script>
            localStorage.setItem("balance", 0);
            $(document).ready(function() {
            $('#login').submit(function(event) {
                event.preventDefault();
                var email = $('#email').val();
                var password = $('#password').val();

                // Verificar las credenciales
                if (email === 'admin@admin.cl' && password === '1234') {
                // Credenciales válidas, redirigir a la pantalla de wallet
                    window.location.href = './menu.html';
                } else {
                // Credenciales inválidas, mostrar mensaje de error
                    alert('Usuario o contraseña invalido. Inténtalo de nuevo.');
                    }
                });
            });    
            
        </script>
    </body>
</html>
